<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signaler une situation</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{
max-width:500px;
padding:25px;
}

h1{
font-size:30px;
margin-bottom:15px;
}

p{
font-size:18px;
opacity:0.9;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-size:16px;
text-align:left;
}

textarea, input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:none;
font-size:16px;
}

textarea{
min-height:120px;
}

button{
width:100%;
padding:18px;
font-size:18px;
border:none;
border-radius:12px;
margin-top:20px;
cursor:pointer;
background:#ef4444;
color:white;
}

button:hover{
opacity:0.9;
}

.retour{
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h1>🚨 Signaler une situation</h1>

<p>Explique ta situation. Tu peux rester totalement anonyme.</p>

<form action="https://formspree.io/f/xaqpbvwo" method="POST">

<label>Décris la situation :</label>
<textarea name="message"></textarea>

<label>Depuis combien de temps ?</label>
<input type="text" name="duree">

<label>Lieu (classe, réseaux sociaux...)</label>
<input type="text" name="lieu">

<label>Si tu veux être recontacté (optionnel)</label>
<input type="email" name="email">

<button type="submit">Envoyer le message</button>

</form>

<a href="index.html">
<button class="retour">⬅ Retour</button>
</a>

</div>

</body>
</html>
