<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signaler une situation</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}


.container{
max-width:500px;
width:90%;
padding:35px;
background:#1e293b;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}


h1{
font-size:28px;
margin-bottom:10px;
text-align:center;
}

p{
font-size:16px;
opacity:0.85;
text-align:center;
}

.info{
font-size:13px;
opacity:0.7;
margin-bottom:20px;
text-align:center;
}


label{
display:block;
margin-top:18px;
font-size:14px;
}


textarea,
input,
select{
width:100%;
padding:14px;
margin-top:6px;
border-radius:10px;
border:none;
background:#334155;
color:white;
font-size:15px;
box-sizing:border-box;
}


textarea{
min-height:120px;
resize:none;
}


::placeholder{
color:#cbd5f5;
opacity:0.6;
}


button{
width:100%;
padding:16px;
font-size:17px;
border:none;
border-radius:12px;
margin-top:22px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}


.envoyer{
background:#ef4444;
color:white;
}

.retour{
background:#2563eb;
color:white;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🚨 Signaler une situation</h1>

<p>
Explique ce qu’il se passe. Tu peux rester totalement anonyme.
</p>

<p class="info">
🔒 Chaque message est lu avec attention.
</p>

<form action="https://formspree.io/f/xaqpbvwo" method="POST">

<input type="text" name="_gotcha" style="display:none">

<label>Décris la situation</label>
<textarea name="message" placeholder="Explique ce qu'il se passe..."></textarea>

<label>Depuis combien de temps ?</label>
<input type="text" name="duree" placeholder="ex : quelques semaines">

<label>Lieu (classe, réseaux sociaux...)</label>
<input type="text" name="lieu" placeholder="ex : classe, Instagram">

<label>Si tu veux être recontacté (optionnel)</label>
<input type="email" name="email" placeholder="ton email (facultatif)">

<label>Comment te sens-tu par rapport à la situation ? </label>

<select name="urgence">
<option value="">Choisir une option</option>
<option value="urgent">🔴 J’ai besoin d’aide rapidement</option>
<option value="difficile">🟠 La situation est difficile</option>
<option value="parler">🟢 Je veux simplement en parler</option>
</select>

<button class="envoyer" type="submit">
Envoyer le message
</button>

</form>

<a href="index.html">
<button class="retour">
⬅ Retour à l'accueil
</button>
</a>

</div>

</body>
</html>
