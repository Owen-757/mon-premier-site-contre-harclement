<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aide Harcèlement</title>

<style>

/* -------- Fond animé -------- */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.05);
animation:float 25s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-10vh);
}
}

/* -------- Style général -------- */

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

/* -------- Carte centrale -------- */

.container{
max-width:500px;
padding:30px;
background:#1e293b;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* -------- Texte -------- */

h1{
font-size:32px;
margin-bottom:15px;
}

p{
font-size:18px;
opacity:0.9;
margin-bottom:30px;
}

/* -------- Boutons -------- */

button{
width:100%;
padding:18px;
font-size:18px;
border:none;
border-radius:12px;
margin-top:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
opacity:0.95;
}

.signaler{
background:#ef4444;
color:white;
}

.ressources{
background:#2563eb;
color:white;
}

.appel{
background:#22c55e;
color:white;
}

footer{
margin-top:30px;
font-size:14px;
opacity:0.6;
}

</style>

</head>

<body>

<!-- Fond animé -->
<div class="background">

<div class="circle" style="width:80px;height:80px;left:10%;animation-duration:25s"></div>
<div class="circle" style="width:40px;height:40px;left:30%;animation-duration:18s"></div>
<div class="circle" style="width:60px;height:60px;left:50%;animation-duration:22s"></div>
<div class="circle" style="width:100px;height:100px;left:70%;animation-duration:30s"></div>
<div class="circle" style="width:50px;height:50px;left:85%;animation-duration:20s"></div>

</div>

<div class="container">

<div style="font-size:55px">🛡️</div>

<h1>Plateforme d’aide</h1>

<p>
Tu peux signaler une situation de harcèlement anonymement et demander de l'aide.
</p>

<p style="font-size:14px;opacity:0.7">
🔒 Ton message peut rester totalement anonyme
</p>

<a href="signaler.html">
<button class="signaler">🚨 Signaler une situation</button>
</a>

<a href="ressources.html">
<button class="ressources">📞 Voir les ressources d’aide</button>
</a>

<a href="tel:3018">
<button class="appel">📞 Appeler le 3018</button>
</a>

<footer>
Projet d’aide aux élèves
</footer>

</div>

</body>
</html>
